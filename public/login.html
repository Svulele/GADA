<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sign in — GADA</title>
  <link rel="stylesheet" href="style.css"/>
<script>
// dark mode persistence
(function(){
  if(localStorage.getItem('gadaDark')==='1') document.body.classList.add('dark');
})();
</script>
</head>
<body>
<header>
  <div class="topbar">
    <div class="brand">
      <div class="brandIcon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="5.5" r="2.5" fill="white" opacity="0.95"/>
          <path d="M2.5 13.5C2.5 11 5 9 8 9C11 9 13.5 11 13.5 13.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>
      <strong>GADA</strong>
    </div>
    <nav class="nav">
      <a class="navLink" href="/">Dashboard</a>
      <a class="navLink active" href="/login.html">Sign in</a>
    </nav>
    <div class="navRight" style="display:flex;align-items:center;gap:8px;">
      <button class="darkToggle" id="darkToggle" title="Toggle dark mode">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M13 10A6 6 0 0 1 6 3a6 6 0 1 0 7 7z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        </svg>
      </button></div>
  </div>
</header>

<div class="loginWrap">
  <div class="loginCard">
    <div class="loginTop">
      <div class="loginMark">
        <svg width="22" height="22" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="5.5" r="2.5" fill="white" opacity="0.95"/>
          <path d="M2.5 13.5C2.5 11 5 9 8 9C11 9 13.5 11 13.5 13.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="loginLogo">GADA</div>
      <div class="loginSub">Secure asset tracking</div>
    </div>
    <div class="loginBody">

      <!-- already logged in -->
      <div id="alreadyIn" style="display:none;">
        <div class="alreadyBox"><p>Signed in as <strong id="curName"></strong></p></div>
        <div class="btnRow" style="margin-top:0;">
          <button class="btn btnPrimary" id="continueBtn" style="flex:1;justify-content:center;">Continue</button>
          <button class="btn" id="logoutBtn">Switch</button>
        </div>
      </div>

      <!-- step 1: select user -->
      <div id="stepUser">
        <h2>Select your account</h2>
        <p>Choose your name, then enter your PIN.</p>
        <div class="field">
          <label class="label" for="userSel">Staff member</label>
          <select id="userSel" class="input"></select>
        </div>
        <button class="btn btnPrimary" id="nextBtn" style="width:100%;justify-content:center;">Continue</button>
        <div id="msgUser" class="loginErr"></div>
      </div>

      <!-- step 2: enter PIN -->
      <div id="stepPin" style="display:none;">
        <button class="pinBack" id="backBtn">← Back</button>
        <h2 id="pinGreet">Enter your PIN</h2>
        <p id="pinSub">Enter your 4-digit PIN to sign in.</p>
        <div class="pinDots" id="pinDots">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="pinPad">
          <button class="pinKey" data-v="1">1</button>
          <button class="pinKey" data-v="2">2</button>
          <button class="pinKey" data-v="3">3</button>
          <button class="pinKey" data-v="4">4</button>
          <button class="pinKey" data-v="5">5</button>
          <button class="pinKey" data-v="6">6</button>
          <button class="pinKey" data-v="7">7</button>
          <button class="pinKey" data-v="8">8</button>
          <button class="pinKey" data-v="9">9</button>
          <button class="pinKey pinKeyEmpty"></button>
          <button class="pinKey" data-v="0">0</button>
          <button class="pinKey pinKeyDel" id="delBtn">⌫</button>
        </div>
        <div id="msgPin" class="loginErr"></div>
      </div>

    </div>
  </div>
</div>

<style>
.loginErr{margin-top:10px;font-size:13px;color:var(--red);min-height:18px;}
.pinBack{background:none;border:none;font-size:12px;color:var(--text-3);cursor:pointer;padding:0;margin-bottom:14px;font-family:var(--font);}
.pinBack:hover{color:var(--text-2);}
.pinDots{display:flex;justify-content:center;gap:14px;margin:20px 0 24px;}
.pinDots span{width:14px;height:14px;border-radius:50%;border:2px solid var(--border-2);transition:all 0.15s;}
.pinDots span.filled{background:var(--green);border-color:var(--green);}
.pinDots span.error{background:var(--red);border-color:var(--red);}
.pinPad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:240px;margin:0 auto;}
.pinKey{height:52px;border-radius:10px;border:1px solid var(--border);background:var(--surface);font-size:18px;font-weight:500;color:var(--text);cursor:pointer;font-family:var(--font);transition:all 0.1s;}
.pinKey:hover{background:var(--green-bg);border-color:var(--green-mid);}
.pinKey:active{transform:scale(0.94);background:var(--green-mid);}
.pinKeyEmpty{background:transparent!important;border-color:transparent!important;cursor:default;}
.pinKeyDel{font-size:16px;color:var(--text-3);}
</style>

<script>
let selectedUserId = '';
let pin = '';

const userSel  = document.getElementById('userSel');
const stepUser = document.getElementById('stepUser');
const stepPin  = document.getElementById('stepPin');
const pinDots  = document.getElementById('pinDots').querySelectorAll('span');
const msgUser  = document.getElementById('msgUser');
const msgPin   = document.getElementById('msgPin');

// load users
fetch('/api/config',{cache:'no-store'}).then(r=>r.json()).then(cfg=>{
  const users = cfg.users||[];
  userSel.innerHTML = users.map(u=>{
    if(typeof u==='string') return `<option value="${u}">${u}</option>`;
    return `<option value="${u.id}">${u.name} — ${u.role||u.id}</option>`;
  }).join('');
}).catch(()=>{ msgUser.textContent='Could not load staff list.'; });

// check already logged in
fetch('/api/me',{credentials:'include'}).then(r=>r.json()).then(me=>{
  if(me.user){
    document.getElementById('curName').textContent = me.user.name||me.user.id;
    document.getElementById('alreadyIn').style.display='block';
    stepUser.style.display='none';
  }
}).catch(()=>{});

document.getElementById('logoutBtn').onclick = async ()=>{
  await fetch('/api/logout',{method:'POST',credentials:'include'});
  document.getElementById('alreadyIn').style.display='none';
  stepUser.style.display='block';
};
document.getElementById('continueBtn').onclick = ()=>{ window.location.href='/'; };

// step 1 → step 2
document.getElementById('nextBtn').onclick = ()=>{
  if(!userSel.value){ msgUser.textContent='Please select a staff member.'; return; }
  selectedUserId = userSel.value;
  const name = userSel.options[userSel.selectedIndex].text.split(' — ')[0];
  document.getElementById('pinGreet').textContent = `Hello, ${name}`;
  stepUser.style.display='none';
  stepPin.style.display='block';
  pin=''; updateDots();
};

document.getElementById('backBtn').onclick = ()=>{
  stepPin.style.display='none';
  stepUser.style.display='block';
  pin=''; msgPin.textContent=''; updateDots();
};

// PIN pad
function updateDots(shake=false) {
  pinDots.forEach((d,i)=>{
    d.className = i < pin.length ? 'filled' : '';
    if(shake) d.className = 'error';
  });
}

document.querySelectorAll('.pinKey[data-v]').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    if(pin.length >= 4) return;
    pin += btn.dataset.v;
    updateDots();
    if(pin.length === 4) submitPin();
  });
});

document.getElementById('delBtn').onclick = ()=>{
  pin = pin.slice(0,-1);
  updateDots();
  msgPin.textContent='';
};

// keyboard support
document.addEventListener('keydown', e=>{
  if(stepPin.style.display==='none') return;
  if(/^[0-9]$/.test(e.key) && pin.length<4){ pin+=e.key; updateDots(); if(pin.length===4) submitPin(); }
  if(e.key==='Backspace'){ pin=pin.slice(0,-1); updateDots(); msgPin.textContent=''; }
});

async function submitPin(){
  try {
    const res = await fetch('/api/login',{
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ userId: selectedUserId, pin })
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok){
      pin='';
      pinDots.forEach(d=>d.className='error');
      setTimeout(()=>{ updateDots(); }, 600);
      msgPin.textContent = data.error||'Incorrect PIN.';
      return;
    }
    window.location.href = data.user?.access==='admin' ? '/admin.html' : '/';
  } catch {
    msgPin.textContent='Network error. Try again.';
    pin=''; updateDots();
  }
}
</script>
<script>
// show timeout message if redirected due to inactivity
if (new URLSearchParams(location.search).get('reason') === 'timeout') {
  document.addEventListener('DOMContentLoaded', () => {
    const msg = document.getElementById('msgUser');
    if (msg) msg.textContent = 'You were signed out due to inactivity.';
  });
}
</script>
</body>
</html>
