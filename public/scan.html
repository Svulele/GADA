<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scan • GADA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="topbar">
      <div class="brand">
        <strong>GADA</strong>
        <span>Scan workflow</span>
      </div>
      <nav class="nav">
        <a class="navLink" href="/">Dashboard</a>
        <a class="navLink active" href="/scan.html">Scan</a>
        <a href="/login.html" class="navButton">Change user</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="pageWrap">
      <div>
        <p class="scanTitle">Record movement</p>
        <p class="scanDesc">Enter or scan the asset tag to log its current location and status.</p>

        <div class="panel" style="margin-bottom: 0;">
          <div class="panelBody">
            <div class="fieldGroup">
              <label class="fieldLabel" for="tag">Asset tag / barcode</label>
              <input id="tag" class="input inputLarge" placeholder="e.g. ASSET-001" autocomplete="off" autofocus />
            </div>

            <div class="gridTwo">
              <div class="fieldGroup">
                <label class="fieldLabel" for="location">Location</label>
                <select id="location" class="input"></select>
              </div>
              <div class="fieldGroup">
                <label class="fieldLabel" for="action">Action</label>
                <select id="action" class="input">
                  <option value="TRANSFERRED">Transfer</option>
                  <option value="SCANNED_IN">Check in</option>
                  <option value="SCANNED_OUT">Check out</option>
                </select>
              </div>
            </div>

            <div class="fieldGroup">
              <label class="fieldLabel" for="notes">Notes <span style="font-weight:300;text-transform:none;letter-spacing:0">(optional)</span></label>
              <input id="notes" class="input" placeholder="Additional notes…" />
            </div>

            <div class="buttonRow">
              <button class="btn btnPrimary" id="submit" type="button">Record scan</button>
              <button class="btn" id="clear" type="button">Clear</button>
            </div>

            <div class="messageBar" id="msg"></div>
          </div>
        </div>
      </div>

      <div>
        <div class="userCard">
          <div class="userCardHeader">
            <div class="userCardLabel">Signed in as</div>
            <div class="userCardName" id="currentUserStatus">Loading…</div>
            <div class="userCardMeta" id="currentUserMeta"></div>
          </div>
          <div class="userCardBody">
            <div class="onlineIndicator" style="margin-bottom: 14px;">
              <div class="heroDot"></div>
              <span>Session active</span>
            </div>
            <button class="btn btnSmall" id="logoutBtn" type="button" style="width:100%;justify-content:center;">
              Change user
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="scan.js"></script>
</body>
</html>
