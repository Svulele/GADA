<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>GADA — Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
<script>
// dark mode persistence
(function(){
  if(localStorage.getItem('gadaDark')==='1') document.body.classList.add('dark');
})();
</script>
</head>
<body>
<header>
  <div class="topbar">
    <div class="brand">
      <div class="brandIcon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="2" width="5" height="5" rx="1.2" fill="white" opacity="0.95"/>
          <rect x="9" y="2" width="5" height="5" rx="1.2" fill="white" opacity="0.95"/>
          <rect x="2" y="9" width="5" height="5" rx="1.2" fill="white" opacity="0.95"/>
          <rect x="9" y="9" width="5" height="5" rx="1.2" fill="white" opacity="0.5"/>
        </svg>
      </div>
      <strong>GADA</strong>
    </div>
    <nav class="nav">
      <a class="navLink active" href="/">Dashboard</a>
      <a class="navLink" href="/scan.html">Scan</a>
      <a class="navLink" href="/kiosk.html" id="kioskNavLink" style="display:none;">Kiosk</a>
      <a class="navLink" href="/admin.html" id="adminNavLink" style="display:none;">Admin</a>
    </nav>
    <div class="navRight" style="display:flex;align-items:center;gap:8px;">
      <button class="darkToggle" id="darkToggle" title="Toggle dark mode">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M13 10A6 6 0 0 1 6 3a6 6 0 1 0 7 7z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        </svg>
      </button>
      <a class="userChip" href="/login.html" id="userChip">
        <div class="userAvatar" id="userAvatar">—</div>
        <div>
          <div class="userName" id="userName">Loading…</div>
          <div class="userRole" id="userRole"></div>
        </div>
        <span class="userCaret">⌄</span>
      </a>
    </div>
  </div>
</header>

<main>
  <div class="pulseBar">
    <div class="pulseLeft">
      <div class="pulseDot"></div>
      <span class="pulseLabel">Facility overview</span>
      <span class="pulseCount" id="pulseCount"></span>
    </div>
    <div class="pulseRight">
      <span class="pulseStat"><span id="totalAssets">—</span> assets</span>
      <span class="pulseDivider"></span>
      <span class="pulseStat"><span id="totalToday">—</span> scans today</span>
      <button class="refreshBtn" id="refreshBtn" title="Refresh">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
          <path d="M12 7A5 5 0 1 1 7 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M7 2l2-2M7 2l2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="facilityGrid" id="facilityGrid"></div>

  <div class="activityStrip">
    <div class="asLabel">Recent activity</div>
    <div class="activityFeed" id="activityFeed"></div>
  </div>
</main>

<dialog id="modal">
  <div class="dHead">
    <div>
      <h2 id="dTitle">Movement history</h2>
      <div class="dSub" id="dTag"></div>
    </div>
    <button class="btn btnSm" id="dClose">Close</button>
  </div>
  <div class="dBody" id="dBody"></div>
</dialog>

<script>
async function loadUser() {
  try {
    const me = await fetch('/api/me',{credentials:'include'}).then(r=>r.json());
    if (!me.user) { window.location.href='/login.html'; return; }
    const u = me.user;
    const name = u.name||u.id||'?';
    const initials = name.split(/[\s\-_]/).map(p=>p[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('userAvatar').textContent = initials;
    document.getElementById('userName').textContent = name;
    document.getElementById('userRole').textContent = u.role||'';
    if (u.access === 'admin') {
      document.getElementById('adminNavLink').style.display = '';
      document.getElementById('kioskNavLink').style.display = '';
    }
  } catch { window.location.href='/login.html'; }
}
loadUser();
</script>
<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
<script src="tour.js"></script>
</body>
</html>
